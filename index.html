<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MegaTech VCFs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <p class="top-text">
    Make sure you are checking here from time to time to see if the contacts have reached 700 so you can download the VCF contacts file! 🔥
  </p>

  <div class="badge">🎵 MEGATECH VCFS</div>

  <h1>MegaTech VCFs</h1>
  <p class="sub">PREMIUM VCF REGISTRATION PORTAL</p>

  <p class="info">
    Register your number. Once we hit <span>700</span> contacts, the VCF file drops 🚀
  </p>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <p id="count">0 registered / 700 goal</p>

  <button class="whatsapp-btn" onclick="joinWhatsApp()">JOIN WHATSAPP GROUP 💬</button>

  <input type="text" id="name" placeholder="Your name">
  <input type="text" id="phone" placeholder="Phone number">

  <button class="join-btn" onclick="joinList()">JOIN THE LIST 🔥</button>

  <div id="notification"></div>

  <button id="shareBtn" onclick="shareNow()">SHARE NOW</button>

</div>

<script src="script.js"></script>
</body>
</html>
