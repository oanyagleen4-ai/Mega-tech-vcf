<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- IMPORTANT FOR FULL SCREEN ON PHONES -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MegaTech VCFs</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <p class="top-text">
    Make sure you are checking here from time to time to see if the contacts have reached 1600 so you can download the VCF contacts file! 🔥
  </p>

  <div class="badge">🎵 MEGATECH VCFS</div>

  <h1>MegaTech VCFs</h1>
  <p class="sub">PREMIUM VCF REGISTRATION PORTAL</p>

  <p class="info">
    Register your number. Once we hit <span>16000</span> contacts, the VCF file drops 🚀
  </p>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <p id="count">0 registered / 1600 goal</p>

  <!-- ✅ UPDATED WHATSAPP BUTTON -->
  <a href="https://chat.whatsapp.com/CpbhPP7mzhyI5q4tCCRy2l?mode=gi_t" target="_blank">
    <button class="whatsapp-btn">JOIN WHATSAPP GROUP 💬</button>
  </a>

  <input type="text" id="name" placeholder="Your name">
  <input type="text" id="phone" placeholder="Phone number">

  <button class="join-btn" onclick="joinList()">JOIN THE LIST 🔥</button>

  <div id="notification"></div>

  <!-- ✅ SHARE BUTTON (WHATSAPP SHARE) -->
  <a href="https://wa.me/?text=Join%20MegaTech%20VCFs%20now%20🔥%20https://ja-tech-vcf.onrender.com" target="_blank">
    <button id="shareBtn">SHARE NOW 🚀</button>
  </a>

</div>

<script src="script.js"></script>
</body>
</html>
